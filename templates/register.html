{% extends "base.html" %}
{% block content %}
<div style="min-height:80vh;display:flex;flex-direction:column;justify-content:center;padding:8px 0;">
    <div style="position:relative;">
        <div style="position:absolute;top:-40px;right:-30px;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,rgba(26,138,90,.15),transparent 70%);pointer-events:none;"></div>
        <div style="position:absolute;bottom:-30px;left:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(200,98,42,.13),transparent 70%);pointer-events:none;"></div>

        <div class="card-elevated" style="padding:28px 22px;border-radius:24px;">
            <div style="text-align:center;margin-bottom:28px;">
                <div style="margin:0 auto 14px;width:60px;height:60px;border-radius:18px;background:rgba(26,138,90,.1);border:1.5px solid rgba(26,138,90,.22);display:flex;align-items:center;justify-content:center;">
                    <i class="fa-solid fa-user-plus" style="font-size:1.4rem;color:var(--emerald);"></i>
                </div>
                <h1 class="font-display" style="font-size:1.7rem;font-weight:800;color:var(--text);letter-spacing:-.02em;">Create Your Vault</h1>
                <p style="color:var(--muted);font-size:.85rem;margin-top:5px;">Begin your financial journey</p>
            </div>

            <form method="POST" action="/register" style="display:flex;flex-direction:column;gap:14px;">
                <div>
                    <div class="label-xs" style="margin-bottom:7px;">Username</div>
                    <input type="text" name="username" required class="input-field" placeholder="Choose a username" autocomplete="username" autocapitalize="none">
                </div>
                <div>
                    <div class="label-xs" style="margin-bottom:7px;">Password</div>
                    <div style="position:relative;">
                        <input type="password" name="password" id="pw-field" required class="input-field" placeholder="Create a strong password" autocomplete="new-password" style="padding-right:44px;">
                        <button type="button" onclick="togglePw('pw-field','pw-eye')" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;">
                            <i id="pw-eye" class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <!-- What you get preview -->
                <div style="background:var(--bg2);border-radius:13px;padding:12px 14px;border:1px solid var(--border);">
                    <div class="label-xs" style="margin-bottom:8px;">Your 4 vaults will be created:</div>
                    <div style="display:flex;flex-direction:column;gap:5px;">
                        <div style="display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2);">
                            <i class="fa-solid fa-building-columns" style="color:var(--sky);width:14px;"></i> Canara Bank
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2);">
                            <i class="fa-solid fa-mobile-screen" style="color:var(--violet);width:14px;"></i> Airtel Bank
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2);">
                            <i class="fa-solid fa-money-bill-wave" style="color:var(--emerald);width:14px;"></i> Cash
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2);">
                            <i class="fa-solid fa-piggy-bank" style="color:var(--amber);width:14px;"></i> Savings Hub
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-emerald" style="margin-top:4px;">
                    <i class="fa-solid fa-rocket"></i> Initialize Vaults
                </button>
            </form>

            <div style="text-align:center;margin-top:18px;font-size:.85rem;color:var(--muted);">
                Already have an account? <a href="/login" style="color:var(--accent);text-decoration:none;font-weight:600;">Unlock your vault →</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePw(fieldId, iconId) {
    const f = document.getElementById(fieldId);
    const i = document.getElementById(iconId);
    if (f.type === 'password') { f.type = 'text'; i.className = 'fa-solid fa-eye'; }
    else { f.type = 'password'; i.className = 'fa-solid fa-eye-slash'; }
}
</script>
{% endblock %}
