{% extends "base.html" %}
{% block content %}
<div style="min-height:80vh;display:flex;flex-direction:column;justify-content:center;padding:8px 0;">
    <div style="position:relative;">
        <div style="position:absolute;top:-40px;left:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(200,98,42,.18),transparent 70%);pointer-events:none;"></div>
        <div style="position:absolute;bottom:-30px;right:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(45,125,210,.14),transparent 70%);pointer-events:none;"></div>

        <div class="card-elevated" style="padding:28px 22px;border-radius:24px;">
            <!-- Logo -->
            <div style="text-align:center;margin-bottom:28px;">
                <div style="margin:0 auto 14px;width:60px;height:60px;border-radius:18px;background:var(--accent-bg);border:1.5px solid rgba(200,98,42,.25);display:flex;align-items:center;justify-content:center;">
                    <i class="fa-solid fa-vault" style="font-size:1.6rem;color:var(--accent);"></i>
                </div>
                <h1 class="font-display" style="font-size:1.7rem;font-weight:800;color:var(--text);letter-spacing:-.02em;">Prodigy Vault</h1>
                <p style="color:var(--muted);font-size:.85rem;margin-top:5px;">Sign in to your financial vault</p>
            </div>

            <form method="POST" action="/login" style="display:flex;flex-direction:column;gap:14px;">
                <div>
                    <div class="label-xs" style="margin-bottom:7px;">Username</div>
                    <input type="text" name="username" required class="input-field" placeholder="Your username" autocomplete="username" autocapitalize="none">
                </div>
                <div>
                    <div class="label-xs" style="margin-bottom:7px;">Password</div>
                    <div style="position:relative;">
                        <input type="password" name="password" id="pw-field" required class="input-field" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px;">
                        <button type="button" onclick="togglePw('pw-field','pw-eye')" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;">
                            <i id="pw-eye" class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:4px;">
                    <i class="fa-solid fa-vault"></i> Unlock Vault
                </button>
            </form>

            <div style="text-align:center;margin-top:18px;font-size:.85rem;color:var(--muted);">
                New to Prodigy? <a href="/register" style="color:var(--accent);text-decoration:none;font-weight:600;">Create a vault →</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePw(fieldId, iconId) {
    const f = document.getElementById(fieldId);
    const i = document.getElementById(iconId);
    if (f.type === 'password') {
        f.type = 'text';
        i.className = 'fa-solid fa-eye';
    } else {
        f.type = 'password';
        i.className = 'fa-solid fa-eye-slash';
    }
}
</script>
{% endblock %}
